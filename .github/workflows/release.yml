# GitHub Actions Release workflow
#
# Builds a Docker image (amd64) and pushes it to the GitHub Container
# Registry (ghcr.io) whenever a version tag is pushed.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The workflow produces these image tags automatically:
#   ghcr.io/pvttwinkle/chessstack:v1.0.0
#   ghcr.io/pvttwinkle/chessstack:v1.0
#   ghcr.io/pvttwinkle/chessstack:v1
#   ghcr.io/pvttwinkle/chessstack:latest
#
# No secrets need to be configured — the built-in GITHUB_TOKEN has write
# access to the repository's container registry automatically.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    # Grant the GITHUB_TOKEN permission to push packages to ghcr.io.
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Check out the repository at the tagged commit.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx, which is the builder backend that
      # supports build caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Authenticate with the GitHub Container Registry.
      # GITHUB_TOKEN is provided automatically by GitHub Actions.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Generate Docker tags from the git tag.
      # For a tag like v1.2.3, this produces:
      #   ghcr.io/pvttwinkle/chessstack:v1.2.3
      #   ghcr.io/pvttwinkle/chessstack:v1.2
      #   ghcr.io/pvttwinkle/chessstack:v1
      #   ghcr.io/pvttwinkle/chessstack:latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      # Step 5: Build for amd64 and push to GHCR.
      # The GitHub Actions layer cache speeds up rebuilds when only source
      # code changes (the npm ci layer is cached).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
