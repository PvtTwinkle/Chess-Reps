# GitHub Actions Release workflow
#
# Builds a multi-architecture Docker image and pushes it to the GitHub
# Container Registry (ghcr.io) whenever a version tag is pushed.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The workflow produces these image tags automatically:
#   ghcr.io/pvttwinkle/chessstack:v1.0.0
#   ghcr.io/pvttwinkle/chessstack:v1.0
#   ghcr.io/pvttwinkle/chessstack:v1
#   ghcr.io/pvttwinkle/chessstack:latest
#
# No secrets need to be configured — the built-in GITHUB_TOKEN has write
# access to the repository's container registry automatically.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    # Grant the GITHUB_TOKEN permission to push packages to ghcr.io.
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Check out the repository at the tagged commit.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download the seed database dumps from the data-v1.0 release.
      # These ~200 MB files are not committed to the repo — they live as
      # GitHub Release assets and get COPY'd into the Docker image so the
      # app can auto-seed on first boot.
      - name: Download seed dumps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download data-v1.0 \
            --pattern 'chessmont-moves-dump.sql.gz' \
            --pattern 'puzzles-dump.sql.gz' \
            --pattern 'celebrity-moves-dump.sql.gz'

      # Step 3: Set up QEMU so Docker can build for architectures other than
      # the runner's native amd64 (we need arm64 for Raspberry Pi / Apple
      # Silicon / ARM cloud instances).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 4: Set up Docker Buildx, which is the builder backend that
      # supports multi-platform builds and build caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Authenticate with the GitHub Container Registry.
      # GITHUB_TOKEN is provided automatically by GitHub Actions.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Generate Docker tags from the git tag.
      # For a tag like v1.2.3, this produces:
      #   ghcr.io/pvttwinkle/chessstack:v1.2.3
      #   ghcr.io/pvttwinkle/chessstack:v1.2
      #   ghcr.io/pvttwinkle/chessstack:v1
      #   ghcr.io/pvttwinkle/chessstack:latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      # Step 7: Build for amd64 + arm64 and push to GHCR.
      # The GitHub Actions layer cache speeds up rebuilds when only source
      # code changes (the npm ci layer is cached).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
