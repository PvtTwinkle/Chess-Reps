# ─────────────────────────────────────────────────────────────────────────────
# Chessmont PGN Import — one-shot container
#
# Parses chessmont.pgn into the chessmont_moves table in PostgreSQL.
# Uses the same postgres service from the main docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.import.yml \
#     run --rm chessmont-import
#
# Common flags (appended after the service name):
#   --workers 8         More parallelism (default: 4)
#   --resume            Continue from last checkpoint after interruption
#   --clean             Truncate table and re-import from scratch
#   --min-games 5       Custom occurrence filter (default: 2)
#
# The PGN file must be in the project root. After import completes, it can
# be deleted — the parsed data lives in the pgdata volume.
#
# Estimated time: ~1-4 hours depending on hardware and worker count.
# ─────────────────────────────────────────────────────────────────────────────

services:
  chessmont-import:
    build:
      context: .
      dockerfile: Dockerfile.chessmont-import
    container_name: chess-reps-chessmont-import

    environment:
      - DATABASE_URL=postgresql://chess_reps:chess_reps_secret@postgres:5432/chess_reps
      - PGN_PATH=/data/chessmont.pgn

    volumes:
      # Bind-mount the PGN file read-only from the project root.
      - ./chessmont.pgn:/data/chessmont.pgn:ro

    depends_on:
      postgres:
        condition: service_healthy
