services:
  app:
    image: ghcr.io/pvttwinkle/chessstack:latest
    container_name: chessstack-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://chessstack:chessstack_secret@postgres:5432/chessstack
      - ORIGIN=http://localhost:3000
      - DEFAULT_USERNAME=admin
      - DEFAULT_PASSWORD=changeme
      - REGISTRATION_MODE=invite # change to 'open' if you want anyone to be able to register an account
      - GAME_IMPORT_INTERVAL_MINUTES=0 # How often the app fetches new games from Lichess & Chess.com.
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  postgres:
    image: postgres:17-alpine
    container_name: chessstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chessstack
      POSTGRES_USER: chessstack
      POSTGRES_PASSWORD: chessstack_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chessstack']
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
