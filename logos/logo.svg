<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f2942"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <radialGradient id="board-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#4a8ac2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4a8ac2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="piece-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="pawn-glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#bg-grad)"/>

  <!-- Light rays radiating from behind board center -->
  <g id="light-rays">
    <!-- Ray 1: upper-left -->
    <polygon points="256,220 42,16 78,16" fill="#4a8ac2" opacity="0.07"/>
    <!-- Ray 2: upper-right -->
    <polygon points="256,220 430,16 470,16" fill="#6aa8d4" opacity="0.05"/>
    <!-- Ray 3: left -->
    <polygon points="256,220 16,130 16,180" fill="#4a8ac2" opacity="0.09"/>
    <!-- Ray 4: right -->
    <polygon points="256,220 496,100 496,155" fill="#6aa8d4" opacity="0.06"/>
    <!-- Ray 5: lower-left -->
    <polygon points="256,220 16,380 16,430" fill="#4a8ac2" opacity="0.08"/>
    <!-- Ray 6: lower-right -->
    <polygon points="256,220 496,350 496,400" fill="#6aa8d4" opacity="0.06"/>
    <!-- Ray 7: upper-center-left -->
    <polygon points="256,220 165,16 200,16" fill="#4a8ac2" opacity="0.12"/>
  </g>

  <ellipse cx="256" cy="260" rx="220" ry="150" fill="url(#board-glow)"/>

  <g id="scene" transform="translate(256,201) scale(1.1)">
    <g id="stack-bottom" opacity="0.35">
      <polygon points="-192,74 -192,99 0,195 0,170" fill="#2a5a82"/>
      <polygon points="0,170 0,195 192,99 192,74" fill="#1c3d5a"/>
    </g>
    <g id="stack-middle" opacity="0.6">
      <polygon points="-192,37 -192,62 0,158 0,133" fill="#2a5a82"/>
      <polygon points="0,133 0,158 192,62 192,37" fill="#1c3d5a"/>
    </g>
    <g id="board-depth">
      <polygon points="-192,0 -192,25 0,121 0,96" fill="#2a5a82"/>
      <polygon points="0,96 0,121 192,25 192,0" fill="#1c3d5a"/>
    </g>
    <g id="board-surface" transform="translate(0,-96)">
      <polygon points="0,0 48,24 0,48 -48,24" fill="#3a6d9e"/>
      <polygon points="48,24 96,48 48,72 0,48" fill="#4a8ac2"/>
      <polygon points="96,48 144,72 96,96 48,72" fill="#3a6d9e"/>
      <polygon points="144,72 192,96 144,120 96,96" fill="#4a8ac2"/>
      <polygon points="-48,24 0,48 -48,72 -96,48" fill="#4a8ac2"/>
      <polygon points="0,48 48,72 0,96 -48,72" fill="#3a6d9e"/>
      <polygon points="48,72 96,96 48,120 0,96" fill="#4a8ac2"/>
      <polygon points="96,96 144,120 96,144 48,120" fill="#3a6d9e"/>
      <polygon points="-96,48 -48,72 -96,96 -144,72" fill="#3a6d9e"/>
      <polygon points="-48,72 0,96 -48,120 -96,96" fill="#4a8ac2"/>
      <polygon points="0,96 48,120 0,144 -48,120" fill="#3a6d9e"/>
      <polygon points="48,120 96,144 48,168 0,144" fill="#4a8ac2"/>
      <polygon points="-144,72 -96,96 -144,120 -192,96" fill="#4a8ac2"/>
      <polygon points="-96,96 -48,120 -96,144 -144,120" fill="#3a6d9e"/>
      <polygon points="-48,120 0,144 -48,168 -96,144" fill="#4a8ac2"/>
      <polygon points="0,144 48,168 0,192 -48,168" fill="#3a6d9e"/>
    </g>
    <polyline points="-192,0 0,-96 192,0" fill="none" stroke="#6aa8d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <ellipse cx="0" cy="-10" rx="65" ry="55" fill="url(#pawn-glow)"/>
    <g id="pawn-piece" transform="translate(0, 48) scale(2.2)" filter="url(#piece-shadow)">
      <ellipse cx="0" cy="2" rx="16" ry="5" fill="#000" opacity="0.35"/>
      <ellipse cx="0" cy="5" rx="22" ry="9" fill="#000" opacity="0.15"/>
      <ellipse cx="0" cy="0" rx="18" ry="7" fill="#aaa" stroke="#0a1a2e" stroke-width="0.8"/>
      <rect x="-17" y="-7" width="34" height="7" rx="2" fill="#aaa"/>
      <ellipse cx="0" cy="-7" rx="17" ry="6.5" fill="#bbb" stroke="#0a1a2e" stroke-width="0.8"/>
      <polygon points="-14,-8 -8,-35 8,-35 14,-8" fill="url(#wg)" stroke="#0a1a2e" stroke-width="0.8"/>
      <rect x="-9" y="-38" width="18" height="5" rx="1.5" fill="#c0c0c0" stroke="#0a1a2e" stroke-width="0.6"/>
      <circle cx="0" cy="-49" r="12" fill="url(#wg)" stroke="#0a1a2e" stroke-width="0.8"/>
      <circle cx="-3" cy="-52" r="4" fill="white" opacity="0.3"/>
    </g>
  </g>

  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#vignette)"/>
</svg>
